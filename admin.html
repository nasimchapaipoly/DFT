<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Food Dept.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Admin specific styles */
        .admin-layout { display: flex; min-height: 100vh; background: var(--bg-alt); }
        .sidebar { width: 250px; background: var(--card-bg); padding: 2rem 1rem; box-shadow: 2px 0 5px rgba(0,0,0,0.05); }
        .sidebar h3 { color: var(--primary-orange); margin-bottom: 2rem; text-align: center; }
        .sidebar ul { list-style: none; }
        .sidebar ul li a { display: block; padding: 1rem; color: var(--text-main); text-decoration: none; border-radius: 5px; margin-bottom: 0.5rem; transition: var(--transition); }
        .sidebar ul li a:hover, .sidebar ul li a.active { background: var(--primary-orange); color: white; }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        .dashboard-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
        .stat-card { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h2 { color: var(--primary-orange); font-size: 2rem; }
        .chart-container { background: var(--card-bg); padding: 1.5rem; border-radius: 8px; margin-bottom: 2rem; }
    </style>
</head>
