<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Department | Polytechnic Institute</title>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body data-theme="light">
    <div id="loader" class="loader-container">
        <div class="spinner"></div>
    </div>

    <header id="header">
        <div class="logo">
            <h2><span class="text-orange">Food</span> Dept.</h2>
        </div>
        <nav id="navbar">
            <ul class="nav-links">
                <li><a href="#home" class="active" data-i18n="home">Home</a></li>
                <li><a href="#teachers" data-i18n="teachers">Teachers</a></li>
                <li><a href="#labs" data-i18n="labs">Labs</a></li>
                <li><a href="#students" data-i18n="students">Students</a></li>
                <li><a href="admin.html" data-i18n="login">Login</a></li>
            </ul>
        </nav>
        <div class="controls">
            <button id="lang-toggle">BN</button>
            <button id="theme-toggle"><i class="fas fa-moon"></i></button>
            <button id="mobile-menu"><i class="fas fa-bars"></i></button>
        </div>
    </header>

    <section id="home" class="hero">
        <div class="hero-content" data-aos="fade-up" data-aos-duration="1000">
            <h1 data-i18n="hero_title">Welcome to the Food Technology Department</h1>
            <p data-i18n="hero_subtitle">Innovating the future of food science and engineering.</p>
            <button class="btn-primary" data-i18n="explore">Explore Now</button>
        </div>
    </section>

    <section id="teachers" class="section-padding bg-alt">
        <div class="container">
            <h2 class="section-title" data-aos="fade-right">Our <span class="text-orange">Faculty</span></h2>
            <div class="grid-container" id="teacher-grid">
                <div class="card" data-aos="zoom-in">
                    <div class="card-img placeholder-img"></div>
                    <h3>Dr. John Doe</h3>
                    <p>Head of Department</p>
                </div>
                </div>
        </div>
    </section>

    <footer>
        <div class="footer-content">
            <p>&copy; 2026 Food Department. All Rights Reserved.</p>
            <div class="dev-card">
                <p>Developed by <strong>[Your Name]</strong></p>
            </div>
        </div>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script type="module" src="js/firebase.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
